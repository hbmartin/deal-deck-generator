# Action Cards (34 total) — game mechanics, identical to the classic deck.
action_cards:
  - id: deal-breaker
    name: "Deal Breaker"
    value: 5
    description: "Steal a complete set of properties from any player."
    fine_print:
      - "(Includes any buildings.)"
      - "Play into center to use."
    quantity: 2

  - id: just-say-no
    name: "Just Say No!"
    value: 4
    description: "Use any time when an action card is played against you."
    fine_print:
      - "Play into center to use."
    quantity: 3

  - id: sly-deal
    name: "Sly Deal"
    value: 3
    description: "Steal a property from the player of your choice."
    fine_print:
      - "(Cannot be part of a full set.)"
      - "Play into center to use."
    quantity: 3

  - id: forced-deal
    name: "Forced Deal"
    value: 3
    description: "Swap any property with another player."
    fine_print:
      - "(Cannot be part of a full set.)"
      - "Play into center to use."
    quantity: 3

  - id: debt-collector
    name: "Debt Collector"
    value: 3
    description: "Force any player to pay you {5M}."
    fine_print:
      - "Play into center to use."
    quantity: 3

  - id: its-my-birthday
    name: "It's My Birthday"
    value: 2
    icon: cake
    description: "All players give you {2M} as a \"gift.\""
    fine_print:
      - "Play into center to use."
    quantity: 3

  - id: pass-go
    name: "Pass Go"
    value: 1
    icon: go_arrow
    description: "Draw 2 extra cards."
    fine_print:
      - "Play into center to use."
    quantity: 10

  - id: house
    name: "House"
    value: 3
    icon: house
    description: "Add onto any full set you own to add {3M} to the rent value."
    fine_print:
      - "(Except railroads and utilities.)"
    quantity: 3

  - id: hotel
    name: "Hotel"
    value: 4
    icon: hotel
    description: "Add onto any full set you own to add {4M} to the rent value."
