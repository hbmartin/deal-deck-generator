# Arizona statewide theme — 106 base cards, plus the shared expansion set.
#
# The property sets group cities, public landscapes, official park names,
# Route 66 communities, and rivers from across Arizona. Their order follows the
# inherited gameplay progression; it is not a ranking of cultural importance or
# a statement of ownership. Tribal representation is limited to current official
# place names, while the visual overlay uses non-tribal state and desert imagery.
#
# {nM} marks an inline money glyph; `fine_print` renders smaller than `description`.

include:
  - expansion

deck:
  footer_text: "ARIZONA DEAL"
  card_back:
    title: "ARIZONA DEAL"

