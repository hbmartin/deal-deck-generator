# Oaxaca City + Valles Centrales theme — 106 cards total.
#
# The property sequence moves from city neighborhoods and gathering places
# toward valley communities and heritage sites; it is gameplay progression,
# not a ranking of cultural value. Game mechanics remain in English.
# {nM} marks an inline money glyph (double-struck M + amount),
# rendered as vector art by the pipeline.
# `fine_print` lines render smaller than `description`, matching the cards.

