name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Cache uv dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install librsvg (SVG rasterizer)
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Run Ruff format check
        run: |
          uv run ruff format --check .

      - name: Run Ruff check
        run: |
          uv run ruff check .

      - name: Run Pyrefly
        run: |
          uv run pyrefly check

      - name: Run tests
        run: |
          uv run pytest tests/ -v

      - name: Render decks (bundled fonts)
        run: |
          uv run python main.py render --fonts bundled                    # classic -> output/classic
          uv run python main.py render --theme chicago --fonts bundled    # chicago -> output/chicago

      - name: Upload rendered deck artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rendered-deck
          path: |
            output/*/png
            output/*/preview
            output/*/manifest.json
          retention-days: 14
