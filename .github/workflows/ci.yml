name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install librsvg (SVG rasterizer)
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Run Black check
        run: |
          uv run black --check .

      - name: Run Ruff check
        run: |
          uv run ruff check .

      - name: Run tests
        run: |
          uv run pytest tests/ -v

      - name: Render full deck (bundled fonts)
        run: |
          uv run python main.py render --fonts bundled

      - name: Upload rendered deck artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-deck
          path: |
            output/png
            output/preview
            output/manifest.json
          retention-days: 14

